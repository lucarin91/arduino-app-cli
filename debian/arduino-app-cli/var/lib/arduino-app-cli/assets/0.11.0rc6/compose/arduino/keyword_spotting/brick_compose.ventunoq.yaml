services:
  ei-keyword-spot-runner:
    image: ${DOCKER_REGISTRY_BASE:-ghcr.io/arduino/}app-bricks/ei-qnn-models-runner:0.11.0
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"     
    ports:
      - ${BIND_ADDRESS:-127.0.0.1}:1340:1337
      - ${BIND_ADDRESS_IPV6:-[::1]}:1340:1337
    devices:
      - /dev/dma_heap/system
      - /dev/dma_heap/qcom,system
      - /dev/fastrpc-cdsp
    volumes:
      - "${CUSTOM_MODEL_PATH:-/home/arduino/.arduino-bricks}:${CUSTOM_MODEL_PATH:-/home/arduino/.arduino-bricks}"
      - /var/lib/arduino-app-cli/models/edge-impulse:/var/lib/arduino-app-cli/models/edge-impulse
    command: ["--model-file", "${EI_KEYWORD_SPOTTING_MODEL:-/models/ootb/ei/keyword-spotting-hey-arduino.eim}", "--run-http-server", "1337", "--dont-print-predictions"]
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:1337/api/info || exit 1" ]
      interval: 2s
      timeout: 2s
      retries: 25
