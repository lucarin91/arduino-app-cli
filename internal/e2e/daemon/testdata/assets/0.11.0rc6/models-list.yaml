models:
 - face-detection:
    name : "Lightweight-Face-Detection"
    description: "A small and accurate model for detecting bounding boxes for faces in images."
    model_labels:
      - face
    supported_boards: ["unoq"]
    bricks:
      - id: "arduino:object_detection"
        model_configuration:
          "EI_OBJ_DETECTION_MODEL": "/models/ootb/ei/lw-face-det.eim"
      - id: "arduino:video_object_detection"
        model_configuration:
          "EI_V_OBJ_DETECTION_MODEL": "/models/ootb/ei/lw-face-det.eim"
    deployment:
      handler: "ei-handler"
      pre-loaded: true          
    metadata:
      model_size_mb: 17
      source: "qualcomm-ai-hub"
      image-resolution: "320x240"
      ei-project-id: 830703
      ei-impulse-id: 3
      ei-model-url: "https://studio.edgeimpulse.com/public/830703/live"      
      source-model-id: "face-det-lite"
      source-model-url: "https://aihub.qualcomm.com/models/face_det_lite"
 - face-detection-qnn:
    name : "Lightweight-Face-Detection"
    description: "A small and accurate model for detecting bounding boxes for faces in images. This version of the model is optimized for NPU acceleration on supported devices, providing faster inference times while maintaining accuracy."
    model_labels:
      - face
    supported_boards: ["ventunoq"]
    bricks:
      - id: "arduino:object_detection"
        model_configuration:
          "EI_OBJ_DETECTION_MODEL": "/models/ootb/ei/lw-face-det-qnn-640.eim"
      - id: "arduino:video_object_detection"
        model_configuration:
          "EI_V_OBJ_DETECTION_MODEL": "/models/ootb/ei/lw-face-det-qnn-640.eim"
    deployment:
      handler: "ei-handler"
      pre-loaded: true          
    metadata:
      model_size_mb: 17
      source: "qualcomm-ai-hub"
      hw_acceleration_backend: "qnn"
      image-resolution: "640x480"
      ei-project-id: 830703
      ei-impulse-id: 2
      ei-model-url: "https://studio.edgeimpulse.com/public/830703/live"      
      source-model-id: "face-det-lite"
      source-model-url: "https://aihub.qualcomm.com/models/face_det_lite"      
