services:
  genie-models-runner:
    image: artifacts.codelinaro.org/iot-solutions-microservices/genai-llm-vlm-service:1.2.0
    # Currently, genie-models-runner requires to run as root
    user: 0:0
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    working_dir: /mnt/work/models
    ports:
      - ${BIND_ADDRESS:-127.0.0.1}:9001:9001
      - ${BIND_ADDRESS_IPV6:-[::1]}:9001:9001 
    # Add capability to allow process to modify resource limits
    cap_add:
      - SYS_RESOURCE
    environment:
      - ADHOC_MODE=${ADHOC_MODE:-true}
      - LOG_LEVEL=${LOG_LEVEL:-ERROR}
      - GENAI_PORT=${GENAI_PORT:-9001}
      - TOOL_RESPONSE_TIMEOUT_SECONDS=${TOOL_RESPONSE_TIMEOUT_SECONDS:-30}
      - GENAI_CONTEXT_CAPPING=${GENAI_CONTEXT_CAPPING:-2048}
      - MAX_ACTIVE_MODELS=${MAX_ACTIVE_MODELS:-3}
    # Memory and resource limits for VLM model loading
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    oom_score_adj: -500
    mem_limit: 10g
    shm_size: 2g
    devices:
      - /dev/dma_heap/system
      - /dev/dma_heap/qcom,system
      - /dev/fastrpc-cdsp
      - /dev/fastrpc-cdsp-secure
    volumes:
      # Mount hexagon firmware
      - /sys/firmware/devicetree/base/model:/run/device-model
      - /usr/share/qcom:/usr/share/qcom
      - /var/lib/arduino-app-cli/models/genai:/mnt/work/models/
    stop_signal: SIGTERM
    stop_grace_period: 10s
    command: ["hypercorn", "openapi_server.main:app", "--bind", "0.0.0.0:${GENAI_PORT:-9001}"]